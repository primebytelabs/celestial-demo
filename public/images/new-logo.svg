<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .logo-text { font-family: Arial, sans-serif; font-weight: bold; font-size: 32px; fill: currentColor; }
      .logo-leaf { fill: #10b981; }
    </style>
  </defs>

  <!-- Decorative leaf -->
  <ellipse cx="60" cy="40" rx="15" ry="25" fill="#10b981" transform="rotate(-35 60 40)" opacity="0.8"/>

  <!-- Circle background -->
  <circle cx="100" cy="100" r="95" stroke="currentColor" stroke-width="2" fill="none" opacity="0.3"/>

  <!-- Text -->
  <text x="100" y="120" text-anchor="middle" class="logo-text">CB</text>

  <!-- Small accent -->
  <line x1="80" y1="135" x2="120" y2="135" stroke="currentColor" stroke-width="2" opacity="0.6"/>
</svg>